<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrOr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">CAMBER ANGLE</text>
  <text x="222" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Measurement Guide</text>

  <!-- Ground line -->
  <line x1="50" y1="420" x2="750" y2="420" stroke="#334155" stroke-width="2"/>

  <!-- FRONT VIEW - Left wheel -->
  <!-- Wheel tilted inward (negative camber) -->
  <g transform="translate(250, 280)">
    <!-- Tire shape - tilted -->
    <rect x="-30" y="-120" width="60" height="240" rx="10" fill="none" stroke="#475569" stroke-width="3" transform="rotate(-4)"/>
    <rect x="-22" y="-110" width="44" height="220" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5" transform="rotate(-4)"/>

    <!-- Hub center -->
    <circle cx="0" cy="0" r="20" fill="#334155" stroke="#475569" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="6" fill="#475569"/>

    <!-- Vertical reference -->
    <line x1="0" y1="140" x2="0" y2="-180" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- Wheel centerline (tilted) -->
    <line x1="10" y1="140" x2="-10" y2="-180" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- Angle arc at top -->
    <path d="M 0 -140 A 40 40 0 0 0 -6 -140" fill="none" stroke="#f97316" stroke-width="2.5"/>
  </g>

  <!-- FRONT VIEW - Right wheel -->
  <g transform="translate(550, 280)">
    <rect x="-30" y="-120" width="60" height="240" rx="10" fill="none" stroke="#475569" stroke-width="3" transform="rotate(4)"/>
    <rect x="-22" y="-110" width="44" height="220" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5" transform="rotate(4)"/>
    <circle cx="0" cy="0" r="20" fill="#334155" stroke="#475569" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="6" fill="#475569"/>
    <line x1="0" y1="140" x2="0" y2="-180" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="-10" y1="140" x2="10" y2="-180" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3"/>
    <path d="M 0 -140 A 40 40 0 0 1 6 -140" fill="none" stroke="#f97316" stroke-width="2.5"/>
  </g>

  <!-- Chassis cross-member between wheels -->
  <line x1="280" y1="270" x2="520" y2="270" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <rect x="350" y="250" width="100" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="250" y="75" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">VERTICAL</text>
  <text x="550" y="75" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">VERTICAL</text>

  <!-- Negative camber label -->
  <rect x="195" y="90" width="110" height="28" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="250" y="110" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">- Camber</text>

  <rect x="495" y="90" width="110" height="28" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="550" y="110" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">- Camber</text>

  <!-- Center label -->
  <text x="400" y="240" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">FRONT VIEW</text>

  <!-- Callout box -->
  <rect x="30" y="60" width="160" height="160" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="88" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">HOW TO MEASURE</text>
  <line x1="50" y1="98" x2="170" y2="98" stroke="#334155" stroke-width="1"/>
  <text x="50" y="118" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Camber = tilt of</text>
  <text x="50" y="134" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">wheel from vertical</text>
  <text x="50" y="154" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">when viewed from</text>
  <text x="50" y="170" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">the front. Use a</text>
  <text x="50" y="186" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">camber gauge on</text>
  <text x="50" y="202" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">the spindle/hub.</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Camber Angle</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>