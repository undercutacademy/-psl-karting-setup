<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="aO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="aOR" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <linearGradient id="hubBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="hubFlange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">FRONT HUBS LENGTH</text>
  <text x="310" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Measurement Guide</text>

  <!-- ===== Assembly side view ===== -->

  <!-- Spindle — L-shaped: vertical steering arm + horizontal stub axle -->
  <g>
    <!-- Vertical steering arm (flat bracket going down) -->
    <path d="M 245,200 L 245,340 Q 245,352 237,352 L 223,352 Q 215,352 215,340 L 215,200"
          fill="#64748b" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Highlight on steering arm -->
    <line x1="225" y1="210" x2="225" y2="345" stroke="#94a3b8" stroke-width="0.8" opacity="0.25"/>
    <!-- Tie rod holes in steering arm -->
    <circle cx="230" cy="285" r="5" fill="#334155" stroke="#475569" stroke-width="1.2"/>
    <circle cx="230" cy="315" r="5" fill="#334155" stroke="#475569" stroke-width="1.2"/>
    <circle cx="230" cy="340" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>

    <!-- C-joint / kingpin area (small rounded block at the bend) -->
    <rect x="225" y="183" width="30" height="28" rx="6" fill="#475569" stroke="#94a3b8" stroke-width="1.8"/>
    <!-- Kingpin bearing bushing -->
    <circle cx="240" cy="197" r="7" fill="#334155" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="240" cy="197" r="3" fill="#475569"/>

    <!-- Horizontal stub axle shaft (where the hub mounts) -->
    <rect x="255" y="193" width="100" height="14" rx="7" fill="#64748b" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Shaft highlight -->
    <line x1="262" y1="197" x2="348" y2="197" stroke="#cbd5e1" stroke-width="0.8" opacity="0.35"/>

    <!-- Labels -->
    <text x="185" y="280" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="end">STEERING</text>
    <text x="185" y="292" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="end">ARM</text>
    <line x1="188" y1="286" x2="213" y2="286" stroke="#475569" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="295" y="183" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">STUB AXLE</text>
  </g>

  <!-- Front hub — compact barrel with flange -->
  <g transform="translate(400,200)">
    <!-- Barrel body -->
    <rect x="-42" y="-32" width="84" height="64" rx="4" fill="url(#hubBody)" stroke="#94a3b8" stroke-width="1.8"/>
    <!-- Inner flange (left, connects to spindle) -->
    <ellipse cx="-42" cy="0" rx="7" ry="40" fill="url(#hubFlange)" stroke="#94a3b8" stroke-width="1.3"/>
    <!-- Front face (right, wheel side) -->
    <ellipse cx="42" cy="0" rx="7" ry="32" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.3"/>
    <!-- Bore -->
    <ellipse cx="42" cy="0" rx="4" ry="13" fill="#334155" stroke="#475569" stroke-width="0.8"/>

    <!-- Studs from flange -->
    <line x1="-42" y1="-38" x2="-42" y2="-48" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <rect x="-45" y="-52" width="6" height="5" rx="1" fill="#64748b"/>
    <line x1="-42" y1="38" x2="-42" y2="48" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <rect x="-45" y="47" width="6" height="5" rx="1" fill="#64748b"/>

    <!-- Grub screws -->
    <circle cx="-12" cy="-32" r="3" fill="#94a3b8" stroke="#7a8a9a" stroke-width="0.8"/>
    <line x1="-14" y1="-32" x2="-10" y2="-32" stroke="#64748b" stroke-width="0.8"/>
    <circle cx="18" cy="-32" r="3" fill="#94a3b8" stroke="#7a8a9a" stroke-width="0.8"/>
    <line x1="16" y1="-32" x2="20" y2="-32" stroke="#64748b" stroke-width="0.8"/>

    <!-- Highlights -->
    <line x1="-34" y1="-27" x2="34" y2="-27" stroke="white" stroke-width="1" opacity="0.3"/>
    <line x1="-30" y1="-23" x2="30" y2="-23" stroke="white" stroke-width="0.5" opacity="0.15"/>

    <!-- Machining rings -->
    <line x1="-25" y1="-30" x2="-25" y2="30" stroke="#b0bec5" stroke-width="0.4" opacity="0.25"/>
    <line x1="0" y1="-32" x2="0" y2="32" stroke="#b0bec5" stroke-width="0.3" opacity="0.2"/>
    <line x1="25" y1="-30" x2="25" y2="30" stroke="#b0bec5" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Hub label -->
  <text x="400" y="130" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">FRONT HUB</text>

  <!-- Wheel mounting flange -->
  <rect x="448" y="163" width="8" height="75" rx="2" fill="#334155" stroke="#475569" stroke-width="1"/>

  <!-- Wheel rim (partial) -->
  <rect x="465" y="148" width="20" height="105" rx="4" fill="none" stroke="#475569" stroke-width="2"/>
  <text x="475" y="143" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">RIM</text>

  <!-- ===== MEASUREMENT: Hub Length dimension ===== -->
  <line x1="358" y1="260" x2="358" y2="290" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="442" y1="260" x2="442" y2="290" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="363" y1="280" x2="437" y2="280" stroke="#f97316" stroke-width="2.5" marker-start="url(#aOR)" marker-end="url(#aO)"/>

  <!-- Length label -->
  <rect x="365" y="295" width="70" height="26" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="400" y="313" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">L [mm]</text>

  <!-- Callout box -->
  <rect x="490" y="340" width="280" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="510" y="368" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">HOW TO MEASURE</text>
  <line x1="510" y1="378" x2="740" y2="378" stroke="#334155" stroke-width="1"/>
  <text x="510" y="398" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Measure the length of the front hub</text>
  <text x="510" y="416" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">body (barrel portion). Common range:</text>
  <text x="510" y="434" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">40mm - 105mm</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Front Hubs Length</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>