<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="aO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="aOR" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">FRONT HUBS LENGTH</text>
  <text x="310" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Measurement Guide</text>

  <!-- Front hub assembly - exploded/cutaway view -->

  <!-- Stub axle / spindle -->
  <rect x="120" y="220" width="200" height="20" rx="6" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="220" y="215" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">STUB AXLE / SPINDLE</text>

  <!-- Front hub body (the key component) -->
  <rect x="330" y="180" width="160" height="100" rx="8" fill="url(#hubGrad)" stroke="#94a3b8" stroke-width="2.5"/>
  <!-- Hub inner detail -->
  <circle cx="410" cy="230" r="25" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <circle cx="410" cy="230" r="10" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <!-- Bolt holes -->
  <circle cx="360" cy="205" r="5" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="460" cy="205" r="5" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="360" cy="255" r="5" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="460" cy="255" r="5" fill="#334155" stroke="#475569" stroke-width="1"/>

  <!-- Hub label -->
  <text x="410" y="170" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">FRONT HUB</text>

  <!-- Wheel mounting flange -->
  <rect x="500" y="170" width="20" height="120" rx="3" fill="#334155" stroke="#475569" stroke-width="1.5"/>

  <!-- Wheel rim (partial) -->
  <rect x="530" y="140" width="30" height="180" rx="4" fill="none" stroke="#475569" stroke-width="2.5"/>
  <text x="545" y="135" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">RIM</text>

  <!-- MEASUREMENT: Hub Length dimension -->
  <line x1="330" y1="310" x2="330" y2="340" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="490" y1="310" x2="490" y2="340" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="335" y1="325" x2="485" y2="325" stroke="#f97316" stroke-width="2.5" marker-start="url(#aOR)" marker-end="url(#aO)"/>

  <!-- Length label -->
  <rect x="365" y="340" width="90" height="28" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="410" y="360" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">L [mm]</text>

  <!-- Callout box -->
  <rect x="30" y="340" width="280" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="368" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">HOW TO MEASURE</text>
  <line x1="50" y1="378" x2="280" y2="378" stroke="#334155" stroke-width="1"/>
  <text x="50" y="398" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Measure the length of the front hub</text>
  <text x="50" y="416" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">body (spacer portion). Common range:</text>
  <text x="50" y="434" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">40mm - 105mm</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Front Hubs Length</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>