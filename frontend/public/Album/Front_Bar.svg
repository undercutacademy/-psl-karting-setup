<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">FRONT BAR</text>
  <text x="175" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Stabilizer Bar Guide</text>

  <!-- Front view of chassis showing bar location -->
  <!-- Chassis frame rails (front view) -->
  <rect x="200" y="150" width="15" height="220" rx="4" fill="#64748b" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="585" y="150" width="15" height="220" rx="4" fill="#64748b" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Cross member top -->
  <rect x="200" y="150" width="400" height="12" rx="3" fill="#475569" stroke="#64748b" stroke-width="1.5"/>

  <!-- Cross member bottom -->
  <rect x="200" y="350" width="400" height="12" rx="3" fill="#475569" stroke="#64748b" stroke-width="1.5"/>

  <!-- FRONT BAR (highlighted) -->
  <rect x="215" y="270" width="370" height="14" rx="7" fill="#f97316" opacity="0.3" stroke="#f97316" stroke-width="2.5"/>
  <!-- Bar mounting clips -->
  <rect x="215" y="260" width="25" height="35" rx="4" fill="#334155" stroke="#f97316" stroke-width="1.5"/>
  <rect x="560" y="260" width="25" height="35" rx="4" fill="#334155" stroke="#f97316" stroke-width="1.5"/>

  <!-- Arrow pointing to bar -->
  <line x1="400" y1="230" x2="400" y2="265" stroke="#f97316" stroke-width="2"/>
  <polygon points="393,265 407,265 400,275" fill="#f97316"/>
  <text x="400" y="222" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">FRONT BAR</text>

  <!-- Front view label -->
  <text x="400" y="140" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">FRONT VIEW — CHASSIS UNDERSIDE</text>

  <!-- Bar Types Comparison -->
  <rect x="30" y="80" width="140" height="260" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="108" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">BAR TYPES</text>
  <line x1="50" y1="118" x2="150" y2="118" stroke="#334155" stroke-width="1"/>

  <!-- Nylon -->
  <rect x="50" y="130" width="80" height="12" rx="6" fill="#a3a3a3" stroke="#737373" stroke-width="1.5"/>
  <text x="100" y="158" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">Nylon</text>
  <text x="100" y="172" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle"> </text>

  <!-- Standard -->
  <rect x="50" y="185" width="80" height="12" rx="6" fill="#94a3b8" stroke="#64748b" stroke-width="1.5"/>
  <text x="100" y="213" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">Standard</text>
  <text x="100" y="227" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle"> </text>

  <!-- Black -->
  <rect x="50" y="240" width="80" height="12" rx="6" fill="#1e1e1e" stroke="#525252" stroke-width="1.5"/>
  <text x="100" y="268" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">Black</text>
  <text x="100" y="282" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle"> </text>

  <!-- None -->
  <rect x="50" y="295" width="80" height="12" rx="6" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="100" y="323" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">None</text>
  <text x="100" y="337" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle">Bar removed</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Front Bar (Stabilizer)</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>