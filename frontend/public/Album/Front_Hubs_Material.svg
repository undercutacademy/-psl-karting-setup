<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="aluGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="40%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="magGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a3a3a3"/>
      <stop offset="40%" stop-color="#737373"/>
      <stop offset="100%" stop-color="#525252"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">FRONT HUBS MATERIAL</text>
  <text x="340" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Material Comparison</text>

  <!-- Divider -->
  <line x1="400" y1="65" x2="400" y2="440" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="450" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">VS</text>

  <!-- LEFT: Aluminium -->
  <text x="200" y="90" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">ALUMINIUM</text>
  <rect x="130" y="96" width="140" height="3" rx="1" fill="#3b82f6"/>

  <!-- Aluminium front hub (cylindrical shape, front view) -->
  <circle cx="200" cy="210" r="65" fill="url(#aluGrad)" stroke="#cbd5e1" stroke-width="2.5"/>
  <circle cx="200" cy="210" r="40" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <circle cx="200" cy="210" r="18" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="200" cy="210" r="5" fill="#64748b"/>
  <!-- Bolt pattern -->
  <circle cx="175" cy="185" r="4" fill="#64748b"/>
  <circle cx="225" cy="185" r="4" fill="#64748b"/>
  <circle cx="175" cy="235" r="4" fill="#64748b"/>
  <circle cx="225" cy="235" r="4" fill="#64748b"/>
  <!-- Highlight -->
  <path d="M 155 175 Q 165 155, 200 150" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>

  <!-- Aluminium properties -->
  <rect x="100" y="295" width="200" height="135" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="120" y="320" fill="#3b82f6" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">PROPERTIES</text>
  <line x1="120" y1="330" x2="280" y2="330" stroke="#334155" stroke-width="1"/>
  <text x="120" y="350" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Weight: Heavier</text>
  <text x="120" y="368" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Finish: Bright silver</text>

  <!-- RIGHT: Magnesium -->
  <text x="600" y="90" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">MAGNESIUM</text>
  <rect x="530" y="96" width="140" height="3" rx="1" fill="#f97316"/>

  <!-- Magnesium front hub -->
  <circle cx="600" cy="210" r="65" fill="url(#magGrad)" stroke="#737373" stroke-width="2.5"/>
  <circle cx="600" cy="210" r="40" fill="#475569" stroke="#525252" stroke-width="2"/>
  <circle cx="600" cy="210" r="18" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="600" cy="210" r="5" fill="#525252"/>
  <circle cx="575" cy="185" r="4" fill="#525252"/>
  <circle cx="625" cy="185" r="4" fill="#525252"/>
  <circle cx="575" cy="235" r="4" fill="#525252"/>
  <circle cx="625" cy="235" r="4" fill="#525252"/>

  <!-- Magnesium properties -->
  <rect x="500" y="295" width="200" height="135" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="520" y="320" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">PROPERTIES</text>
  <line x1="520" y1="330" x2="680" y2="330" stroke="#334155" stroke-width="1"/>
  <text x="520" y="350" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Weight: Lighter</text>
  <text x="520" y="368" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Finish: Dark matte</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Front Hubs Material</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>