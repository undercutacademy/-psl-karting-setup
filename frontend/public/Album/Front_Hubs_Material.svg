<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- White aluminium gradients -->
    <linearGradient id="awBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="awFlange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <!-- Black aluminium gradients -->
    <linearGradient id="abBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52525b"/>
      <stop offset="50%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="abFlange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#71717a"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <!-- Magnesium gradients -->
    <linearGradient id="mgBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a3a3a3"/>
      <stop offset="50%" stop-color="#737373"/>
      <stop offset="100%" stop-color="#525252"/>
    </linearGradient>
    <linearGradient id="mgFlange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a3a3a3"/>
      <stop offset="100%" stop-color="#525252"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">FRONT HUBS MATERIAL</text>
  <text x="340" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Material Comparison</text>

  <!-- Dividers -->
  <line x1="270" y1="65" x2="270" y2="440" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="530" y1="65" x2="530" y2="440" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT: White Aluminium ===== -->
  <text x="135" y="90" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">ALUMINIUM</text>
  <text x="135" y="108" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">(White)</text>
  <rect x="65" y="112" width="140" height="3" rx="1" fill="#3b82f6"/>

  <!-- Hub body — side-view cylinder barrel -->
  <g transform="translate(135,200)">
    <!-- Barrel body -->
    <rect x="-30" y="-35" width="60" height="70" rx="4" fill="url(#awBody)" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Flange (wider disc at left end) -->
    <ellipse cx="-30" cy="0" rx="8" ry="45" fill="url(#awFlange)" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Front face ellipse (right end, visible bore) -->
    <ellipse cx="30" cy="0" rx="8" ry="35" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1.2"/>
    <!-- Bore hole -->
    <ellipse cx="30" cy="0" rx="5" ry="16" fill="#334155" stroke="#475569" stroke-width="1"/>
    <!-- Grub screws / studs protruding from flange -->
    <line x1="-30" y1="-42" x2="-30" y2="-54" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <rect x="-33" y="-58" width="6" height="5" rx="1" fill="#64748b"/>
    <line x1="-30" y1="42" x2="-30" y2="54" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <rect x="-33" y="53" width="6" height="5" rx="1" fill="#64748b"/>
    <!-- Side studs -->
    <line x1="-42" y1="0" x2="-50" y2="0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <rect x="-54" y="-3" width="5" height="6" rx="1" fill="#64748b"/>
    <!-- Top highlight streak -->
    <line x1="-22" y1="-30" x2="22" y2="-30" stroke="white" stroke-width="1" opacity="0.3"/>
    <line x1="-18" y1="-26" x2="18" y2="-26" stroke="white" stroke-width="0.6" opacity="0.15"/>
    <!-- Machining ring on barrel -->
    <line x1="-25" y1="-32" x2="-25" y2="32" stroke="#b0bec5" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="-35" x2="0" y2="35" stroke="#b0bec5" stroke-width="0.3" opacity="0.2"/>
    <line x1="20" y1="-33" x2="20" y2="33" stroke="#b0bec5" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Properties -->
  <rect x="35" y="290" width="200" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="55" y="318" fill="#3b82f6" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">PROPERTIES</text>
  <line x1="55" y1="328" x2="215" y2="328" stroke="#334155" stroke-width="1"/>
  <text x="55" y="348" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Weight: Heavier</text>
  <text x="55" y="366" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Finish: Bright silver/white</text>

  <!-- ===== CENTER: Black Aluminium ===== -->
  <text x="400" y="90" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">ALUMINIUM</text>
  <text x="400" y="108" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">(Black)</text>
  <rect x="330" y="112" width="140" height="3" rx="1" fill="#a855f7"/>

  <g transform="translate(400,200)">
    <!-- Barrel body -->
    <rect x="-30" y="-35" width="60" height="70" rx="4" fill="url(#abBody)" stroke="#52525b" stroke-width="1.5"/>
    <!-- Flange -->
    <ellipse cx="-30" cy="0" rx="8" ry="45" fill="url(#abFlange)" stroke="#52525b" stroke-width="1.5"/>
    <!-- Front face -->
    <ellipse cx="30" cy="0" rx="8" ry="35" fill="#3f3f46" stroke="#52525b" stroke-width="1.2"/>
    <!-- Bore hole -->
    <ellipse cx="30" cy="0" rx="5" ry="16" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <!-- Studs -->
    <line x1="-30" y1="-42" x2="-30" y2="-54" stroke="#52525b" stroke-width="3" stroke-linecap="round"/>
    <rect x="-33" y="-58" width="6" height="5" rx="1" fill="#3f3f46"/>
    <line x1="-30" y1="42" x2="-30" y2="54" stroke="#52525b" stroke-width="3" stroke-linecap="round"/>
    <rect x="-33" y="53" width="6" height="5" rx="1" fill="#3f3f46"/>
    <line x1="-42" y1="0" x2="-50" y2="0" stroke="#52525b" stroke-width="3" stroke-linecap="round"/>
    <rect x="-54" y="-3" width="5" height="6" rx="1" fill="#3f3f46"/>
    <!-- Subtle highlight -->
    <line x1="-22" y1="-30" x2="22" y2="-30" stroke="white" stroke-width="0.8" opacity="0.12"/>
    <!-- Machining rings -->
    <line x1="-25" y1="-32" x2="-25" y2="32" stroke="#64748b" stroke-width="0.4" opacity="0.2"/>
    <line x1="0" y1="-35" x2="0" y2="35" stroke="#64748b" stroke-width="0.3" opacity="0.15"/>
    <line x1="20" y1="-33" x2="20" y2="33" stroke="#64748b" stroke-width="0.3" opacity="0.15"/>
  </g>

  <!-- Properties -->
  <rect x="300" y="290" width="200" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="320" y="318" fill="#a855f7" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">PROPERTIES</text>
  <line x1="320" y1="328" x2="480" y2="328" stroke="#334155" stroke-width="1"/>
  <text x="320" y="348" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Weight: Heavier</text>
  <text x="320" y="366" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Finish: Dark glossy/anodized</text>

  <!-- ===== RIGHT: Magnesium ===== -->
  <text x="665" y="90" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">MAGNESIUM</text>
  <rect x="595" y="100" width="140" height="3" rx="1" fill="#f97316"/>

  <g transform="translate(665,200)">
    <!-- Barrel body -->
    <rect x="-30" y="-35" width="60" height="70" rx="4" fill="url(#mgBody)" stroke="#737373" stroke-width="1.5"/>
    <!-- Flange -->
    <ellipse cx="-30" cy="0" rx="8" ry="45" fill="url(#mgFlange)" stroke="#737373" stroke-width="1.5"/>
    <!-- Front face -->
    <ellipse cx="30" cy="0" rx="8" ry="35" fill="#737373" stroke="#636363" stroke-width="1.2"/>
    <!-- Bore hole -->
    <ellipse cx="30" cy="0" rx="5" ry="16" fill="#334155" stroke="#475569" stroke-width="1"/>
    <!-- Studs -->
    <line x1="-30" y1="-42" x2="-30" y2="-54" stroke="#737373" stroke-width="3" stroke-linecap="round"/>
    <rect x="-33" y="-58" width="6" height="5" rx="1" fill="#525252"/>
    <line x1="-30" y1="42" x2="-30" y2="54" stroke="#737373" stroke-width="3" stroke-linecap="round"/>
    <rect x="-33" y="53" width="6" height="5" rx="1" fill="#525252"/>
    <line x1="-42" y1="0" x2="-50" y2="0" stroke="#737373" stroke-width="3" stroke-linecap="round"/>
    <rect x="-54" y="-3" width="5" height="6" rx="1" fill="#525252"/>
    <!-- No shiny highlight — matte finish -->
    <!-- Machining rings (very subtle) -->
    <line x1="-25" y1="-32" x2="-25" y2="32" stroke="#8a8a8a" stroke-width="0.3" opacity="0.15"/>
    <line x1="0" y1="-35" x2="0" y2="35" stroke="#8a8a8a" stroke-width="0.3" opacity="0.1"/>
  </g>

  <!-- Properties -->
  <rect x="565" y="290" width="200" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="585" y="318" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">PROPERTIES</text>
  <line x1="585" y1="328" x2="745" y2="328" stroke="#334155" stroke-width="1"/>
  <text x="585" y="348" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Weight: Lighter</text>
  <text x="585" y="366" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Finish: Dark matte</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Front Hubs Material</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>