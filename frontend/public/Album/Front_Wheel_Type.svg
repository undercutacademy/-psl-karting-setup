<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">FRONT WHEEL TYPE</text>
  <text x="310" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Mini/Micro Divisions</text>

  <!-- Divider line -->
  <line x1="400" y1="70" x2="400" y2="440" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="450" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="middle">VS</text>

  <!-- LEFT: Hub Type -->
  <text x="200" y="90" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">HUB</text>
  <rect x="155" y="96" width="90" height="3" rx="1" fill="#3b82f6"/>

  <!-- Hub wheel front view -->
  <!-- Outer tire -->
  <circle cx="200" cy="260" r="110" fill="none" stroke="#475569" stroke-width="4"/>
  <circle cx="200" cy="260" r="90" fill="none" stroke="#334155" stroke-width="2"/>
  <!-- Rim -->
  <circle cx="200" cy="260" r="65" fill="none" stroke="#475569" stroke-width="3"/>
  <!-- Hub (the key component) -->
  <circle cx="200" cy="260" r="35" fill="#334155" stroke="#3b82f6" stroke-width="2.5"/>
  <circle cx="200" cy="260" r="18" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <circle cx="200" cy="260" r="6" fill="#475569"/>

  <!-- Hub bolt pattern -->
  <circle cx="200" cy="230" r="4" fill="#475569"/>
  <circle cx="225" cy="250" r="4" fill="#475569"/>
  <circle cx="225" cy="270" r="4" fill="#475569"/>
  <circle cx="200" cy="290" r="4" fill="#475569"/>
  <circle cx="175" cy="270" r="4" fill="#475569"/>
  <circle cx="175" cy="250" r="4" fill="#475569"/>

  <!-- Hub label -->
  <rect x="140" y="390" width="120" height="28" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="410" fill="#3b82f6" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">With Hub</text>

  <!-- Arrow to hub -->
  <line x1="270" y1="200" x2="235" y2="240" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="275" y="195" fill="#3b82f6" font-family="Arial, Helvetica, sans-serif" font-size="11">Hub spacer</text>

  <!-- RIGHT: No Hub Type -->
  <text x="600" y="90" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">NO HUB</text>
  <rect x="555" y="96" width="90" height="3" rx="1" fill="#f97316"/>

  <!-- No-hub wheel front view -->
  <circle cx="600" cy="260" r="110" fill="none" stroke="#475569" stroke-width="4"/>
  <circle cx="600" cy="260" r="90" fill="none" stroke="#334155" stroke-width="2"/>
  <circle cx="600" cy="260" r="65" fill="none" stroke="#475569" stroke-width="3"/>
  <!-- Direct mount (no hub spacer) -->
  <circle cx="600" cy="260" r="18" fill="#1e293b" stroke="#f97316" stroke-width="2.5"/>
  <circle cx="600" cy="260" r="6" fill="#475569"/>

  <!-- Single bolt/nut -->
  <rect x="592" y="252" width="16" height="16" rx="3" fill="#475569" stroke="#64748b" stroke-width="1.5"/>

  <!-- No hub label -->
  <rect x="540" y="390" width="120" height="28" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="600" y="410" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">No Hub</text>

  <!-- Arrow -->
  <line x1="670" y1="200" x2="620" y2="250" stroke="#f97316" stroke-width="1.5"/>
  <text x="675" y="195" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="11">Direct mount</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Front Wheel Type (Mini/Micro only)</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>