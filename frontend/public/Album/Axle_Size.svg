<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="aO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="aOR" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <linearGradient id="axleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="40%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">AXLE SIZE</text>
  <text x="160" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Measurement Guide</text>

  <!-- Close-up: Rear axle cross-section view -->
  <!-- Axle shaft - 3D perspective -->
  <rect x="100" y="200" width="600" height="60" rx="30" fill="url(#axleGrad)" stroke="#94a3b8" stroke-width="2"/>
  <!-- Center highlight line -->
  <line x1="130" y1="222" x2="670" y2="222" stroke="#cbd5e1" stroke-width="1" opacity="0.4"/>

  <!-- Keyway slot -->
  <rect x="350" y="200" width="100" height="10" rx="2" fill="#334155" stroke="#475569" stroke-width="1"/>

  <!-- Left end cap -->
  <ellipse cx="100" cy="230" rx="8" ry="30" fill="#475569" stroke="#64748b" stroke-width="1.5"/>

  <!-- Right end cap -->
  <ellipse cx="700" cy="230" rx="8" ry="30" fill="#475569" stroke="#64748b" stroke-width="1.5"/>

  <!-- Bearing housings -->
  <rect x="200" y="185" width="40" height="90" rx="6" fill="#334155" stroke="#475569" stroke-width="2"/>
  <rect x="560" y="185" width="40" height="90" rx="6" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="220" y="180" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle">BEARING</text>
  <text x="580" y="180" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle">BEARING</text>

  <!-- MEASUREMENT: Axle diameter (cross-section view) -->
  <!-- Show cross-section circle on the right side -->
  <circle cx="400" cy="370" r="50" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <circle cx="400" cy="370" r="30" fill="url(#axleGrad)" stroke="#94a3b8" stroke-width="2"/>
  <!-- Keyway in cross-section -->
  <rect x="394" y="340" width="12" height="15" rx="1" fill="#334155" stroke="#475569" stroke-width="1"/>

  <!-- Diameter dimension line -->
  <line x1="370" y1="370" x2="430" y2="370" stroke="#f97316" stroke-width="2.5" marker-start="url(#aOR)" marker-end="url(#aO)"/>
  <line x1="400" y1="340" x2="400" y2="400" stroke="#f97316" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Diameter label -->
  <rect x="435" y="356" width="80" height="28" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="475" y="376" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">⌀ mm</text>

  <!-- Cross-section label -->
  <text x="400" y="440" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">CROSS SECTION</text>

  <!-- Length dimension -->
  <line x1="100" y1="140" x2="100" y2="160" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="140" x2="700" y2="160" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="105" y1="150" x2="695" y2="150" stroke="#3b82f6" stroke-width="2" marker-start="url(#aOR)" marker-end="url(#aO)"/>
  <rect x="350" y="135" width="100" height="28" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="155" fill="#3b82f6" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Length [mm]</text>

  <!-- Callout box -->
  <rect x="540" y="320" width="230" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="560" y="348" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">HOW TO MEASURE</text>
  <line x1="560" y1="358" x2="740" y2="358" stroke="#334155" stroke-width="1"/>
  <text x="560" y="378" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Axle size = diameter of the</text>
  <text x="560" y="396" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">rear axle shaft. Common:</text>
  <text x="560" y="416" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">30mm, 40mm, or 50mm</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Axle Size</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>