<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="aO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="aOR" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">REAR HUBS LENGTH</text>
  <text x="300" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Measurement Guide</text>

  <!-- Rear axle shaft -->
  <rect x="80" y="220" width="640" height="20" rx="10" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <line x1="100" y1="224" x2="700" y2="224" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <text x="400" y="215" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">REAR AXLE</text>

  <!-- Left bearing housing -->
  <rect x="220" y="200" width="40" height="60" rx="5" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="240" y="195" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle">BEARING</text>

  <!-- Right bearing housing -->
  <rect x="540" y="200" width="40" height="60" rx="5" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="560" y="195" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle">BEARING</text>

  <!-- LEFT rear hub (highlighted) -->
  <rect x="100" y="175" width="110" height="110" rx="10" fill="url(#hubGrad)" stroke="#e2e8f0" stroke-width="2.5"/>
  <circle cx="155" cy="230" r="28" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <circle cx="155" cy="230" r="12" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <!-- Bolt pattern -->
  <circle cx="125" cy="200" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="185" cy="200" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="125" cy="260" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="185" cy="260" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="155" y="165" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">REAR HUB</text>

  <!-- RIGHT rear hub -->
  <rect x="590" y="175" width="110" height="110" rx="10" fill="url(#hubGrad)" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="645" cy="230" r="28" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <circle cx="645" cy="230" r="12" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="615" cy="200" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="675" cy="200" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="615" cy="260" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="675" cy="260" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>

  <!-- Left wheel rim -->
  <rect x="60" y="160" width="30" height="140" rx="5" fill="none" stroke="#475569" stroke-width="2.5"/>
  <text x="75" y="155" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle">RIM</text>

  <!-- Right wheel rim -->
  <rect x="710" y="160" width="30" height="140" rx="5" fill="none" stroke="#475569" stroke-width="2.5"/>

  <!-- MEASUREMENT: Hub Length dimension (left hub) -->
  <line x1="100" y1="310" x2="100" y2="340" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="210" y1="310" x2="210" y2="340" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="105" y1="325" x2="205" y2="325" stroke="#f97316" stroke-width="2.5" marker-start="url(#aOR)" marker-end="url(#aO)"/>

  <!-- Length label -->
  <rect x="115" y="345" width="80" height="28" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="155" y="365" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">L [mm]</text>

  <!-- Callout box -->
  <rect x="280" y="340" width="280" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="300" y="368" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">HOW TO MEASURE</text>
  <line x1="300" y1="378" x2="530" y2="378" stroke="#334155" stroke-width="1"/>
  <text x="300" y="398" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Measure the length of the rear hub body</text>
  <text x="300" y="416" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">from inner face to outer face.</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Rear Hubs Length</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>