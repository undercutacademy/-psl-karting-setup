<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">CASTER ANGLE</text>
  <text x="210" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Measurement Guide</text>

  <!-- Ground line -->
  <line x1="50" y1="420" x2="750" y2="420" stroke="#334155" stroke-width="2"/>
  <text x="60" y="440" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10">GROUND LEVEL</text>

  <!-- Front wheel - side view closeup -->
  <circle cx="350" cy="380" r="80" fill="none" stroke="#475569" stroke-width="4"/>
  <circle cx="350" cy="380" r="55" fill="none" stroke="#334155" stroke-width="1.5"/>
  <circle cx="350" cy="380" r="30" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <circle cx="350" cy="380" r="8" fill="#475569"/>

  <!-- Tire tread pattern -->
  <circle cx="350" cy="380" r="75" fill="none" stroke="#334155" stroke-width="8" stroke-dasharray="12,8"/>

  <!-- Kingpin / steering axis (tilted) -->
  <line x1="310" y1="420" x2="380" y2="120" stroke="#e2e8f0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Upper and lower pivot points -->
  <circle cx="370" cy="175" r="6" fill="#f97316" stroke="#f97316" stroke-width="2"/>
  <circle cx="325" cy="375" r="6" fill="#f97316" stroke="#f97316" stroke-width="2"/>
  <text x="380" y="170" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Upper pivot</text>
  <text x="260" y="390" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="11">Lower pivot</text>

  <!-- Vertical reference line -->
  <line x1="325" y1="420" x2="325" y2="80" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="295" y="75" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10">VERTICAL</text>

  <!-- CASTER ANGLE ARC -->
  <path d="M 325 170 A 120 120 0 0 1 365 170" fill="none" stroke="#f97316" stroke-width="3"/>

  <!-- Angle value -->
  <rect x="335" y="140" width="70" height="32" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="370" y="162" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">28°</text>

  <!-- Direction of travel arrow -->
  <line x1="550" y1="420" x2="700" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#arrO)"/>
  <text x="580" y="412" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Direction of travel</text>

  <!-- Callout box -->
  <rect x="500" y="80" width="270" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="520" y="108" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">HOW TO MEASURE</text>
  <line x1="520" y1="118" x2="740" y2="118" stroke="#334155" stroke-width="1"/>
  <text x="520" y="140" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Caster is the angle of the</text>
  <text x="520" y="158" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">steering axis (kingpin) from</text>
  <text x="520" y="176" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">vertical. Use a caster/camber</text>
  <text x="520" y="194" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">gauge on the spindle. Typical:</text>
  <text x="520" y="212" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold">10° - 30° depending on class</text>

  <line x1="500" y1="170" x2="400" y2="155" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Caster Angle</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>