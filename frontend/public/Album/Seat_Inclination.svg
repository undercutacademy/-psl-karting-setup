<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a"/>
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="48" fill="rgba(0,0,0,0.6)"/>
  <text x="24" y="32" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">SEAT INCLINATION</text>
  <text x="270" y="32" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Measurement Guide</text>

  <!-- Kart chassis - side view -->
  <path d="M 80 360 L 720 360" stroke="#64748b" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 80 360 L 60 340 L 60 380 L 80 360" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <path d="M 720 360 L 740 345 L 740 375 L 720 360" fill="#475569" stroke="#64748b" stroke-width="2"/>

  <!-- Rear wheel -->
  <circle cx="140" cy="400" r="40" fill="none" stroke="#475569" stroke-width="3"/>
  <circle cx="140" cy="400" r="18" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <circle cx="140" cy="400" r="5" fill="#475569"/>
  <rect x="115" y="355" width="50" height="12" rx="3" fill="#334155" stroke="#475569" stroke-width="1.5"/>

  <!-- Front wheel -->
  <circle cx="660" cy="400" r="32" fill="none" stroke="#475569" stroke-width="3"/>
  <circle cx="660" cy="400" r="14" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <circle cx="660" cy="400" r="4" fill="#475569"/>

  <!-- Steering -->
  <line x1="580" y1="360" x2="560" y2="230" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="555" cy="220" rx="35" ry="8" fill="none" stroke="#94a3b8" stroke-width="4" transform="rotate(-10, 555, 220)"/>
  <circle cx="555" cy="220" r="5" fill="#64748b"/>

  <!-- Floor pan -->
  <rect x="200" y="360" width="350" height="6" rx="2" fill="#334155" stroke="#475569" stroke-width="1"/>

  <!-- Seat with inclination angle -->
  <path d="M 330 360 L 310 200 Q 308 170 328 162 L 358 155 Q 388 148 395 168 L 420 360"
        fill="#1e293b" stroke="#e2e8f0" stroke-width="2.5"/>
  <rect x="320" y="348" width="14" height="16" rx="2" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
  <rect x="408" y="348" width="14" height="16" rx="2" fill="#475569" stroke="#64748b" stroke-width="1.5"/>

  <!-- MEASUREMENT: Inclination Angle -->
  <!-- Vertical reference line -->
  <line x1="350" y1="360" x2="350" y2="120" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="354" y="115" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10">VERTICAL</text>

  <!-- Seat back angle line -->
  <line x1="350" y1="360" x2="318" y2="160" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Angle arc -->
  <path d="M 350 230 A 70 70 0 0 0 339 228" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <path d="M 350 260 A 55 55 0 0 0 341 258" fill="none" stroke="#f97316" stroke-width="2"/>

  <!-- Angle label -->
  <rect x="358" y="232" width="55" height="28" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="385" y="252" fill="#f97316" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" text-anchor="middle">θ°</text>

  <!-- Callout box -->
  <rect x="460" y="80" width="290" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="480" y="108" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">HOW TO MEASURE</text>
  <line x1="480" y1="118" x2="720" y2="118" stroke="#334155" stroke-width="1"/>
  <text x="480" y="140" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Measure the angle between the</text>
  <text x="480" y="158" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">seat back and vertical. Use a</text>
  <text x="480" y="176" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">digital inclinometer placed on</text>
  <text x="480" y="194" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">the seat back surface.</text>
  <line x1="460" y1="160" x2="390" y2="242" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="800" height="40" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="485" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="11">Seat Inclination</text>
  <text x="700" y="485" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="end">Setup Guide</text>
</svg>